<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | YIFAN</title> 
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}"> 
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="{{ site.baseurl }}/" class="logo">YIFAN</a>
        </div> 
    </nav>

    <div class="container">
        <article class="widget" style="padding: 50px; margin-top: 40px; border-radius: 12px;">
            <h1>{{ page.title }}</h1> 
            <div class="post-meta" style="color: #b2bec3; margin-bottom: 20px;">{{ page.date | date: "%Y-%m-%d" }}</div> 
            <div class="post-body" style="line-height: 1.8;">
                {{ content }} 
            </div>
            
            <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee;">
                <a href="{{ site.baseurl }}/" style="text-decoration: none; color: #0984e3; font-weight: bold;">← 返回首页</a>
            </div>
        </article>

        <div style="margin-top: 30px; margin-bottom: 50px;">
            <script src="https://giscus.app/client.js"
                data-repo="4234532/meyifan"
                data-repo-id="R_kgDORKpgJw"
                data-category="Announcements"
                data-category-id="DIC_kwDORKpgJ84C3rf4"
                data-mapping="pathname"
                data-strict="0"
                data-reactions-enabled="1"
                data-emit-metadata="0"
                data-input-position="bottom"
                data-theme="preferred_color_scheme"
                data-lang="zh-CN"
                crossorigin="anonymous"
                async>
            </script>
        </div>
    </div>
</body>
</html>
