<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | YIFAN</title> <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="{{ site.baseurl }}/" class="logo">YIFAN</a>
        </div>
    </nav>
    <div class="container">
        <article class="widget" style="padding: 50px; margin-top: 40px; border-radius: 16px;">
            <h1 style="font-family: 'Noto Serif SC', serif;">{{ page.title }}</h1>
            <div class="post-meta" style="color: #b2bec3; margin-bottom: 20px;">
                {{ page.date | date: "%Y-%m-%d" }} </div>
            <hr style="border: 0; border-top: 1px solid rgba(0,0,0,0.1); margin: 30px 0;">
            <div class="post-body" style="line-height: 1.8; font-size: 1.1rem;">
                {{ content }} </div>
            <div style="margin-top: 50px;">
                <a href="{{ site.baseurl }}/" style="text-decoration: none; color: #0984e3; font-weight: bold;">← 返回首页</a>
            </div>
        </article>
    </div>
</body>
</html>
