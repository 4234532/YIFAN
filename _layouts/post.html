<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ page.title }} | YIFAN</title> 
    
    <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <script defer src="https://cusdis.com/js/cusdis.es.js"></script>

    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @media (max-width: 768px) {
            .widget {
                padding: 20px !important;
                margin-top: 20px !important;
            }
            .post-body {
                font-size: 16px !important;
                line-height: 1.6;
            }
            h1 {
                font-size: 1.5rem !important;
            }
            #cusdis_wrapper {
                padding: 15px !important;
                margin-top: 30px !important;
            }
            .giscus-reactions-wrapper {
                padding: 20px !important;
            }
        }

        .giscus-reactions-wrapper {
            margin: 40px 0 0 0;
            padding: 30px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            text-align: center;
        }

        .giscus-reactions-wrapper .reactions-label {
            font-size: 0.9rem;
            color: #636e72;
            margin-bottom: 12px;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="{{ site.baseurl }}/" class="logo">YIFAN</a>
        </div> 
    </nav>

    <div class="container">
        <article class="widget" style="padding: 50px; margin-top: 40px; border-radius: 12px; background-color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <h1>{{ page.title }}</h1> 
            <div class="post-meta" style="color: #b2bec3; margin-bottom: 20px; display: flex; gap: 20px; align-items: center;">
                <span>{{ page.date | date: "%Y-%m-%d" }}</span>
                <span>
                    <i class="fas fa-eye" style="margin-right: 4px;"></i>
                    <span id="busuanzi_value_page_pv">--</span> 次阅读
                </span>
            </div>
            
            <div class="post-body" style="line-height: 1.8;">
                {{ content }}
            </div>

            <!-- Giscus 点赞（Reactions），数据存于 GitHub Discussions，跨设备同步 -->
            <div class="giscus-reactions-wrapper">
                <p class="reactions-label">觉得不错？用表情告诉我 👇（需要 GitHub 账号）</p>
                <script src="https://giscus.app/client.js"
                        data-repo="4234532/YIFAN"
                        data-repo-id="R_kgDORKpgJw"
                        data-category="General"
                        data-category-id="DIC_kwDORKpgJ84C3rf5"
                        data-mapping="pathname"
                        data-strict="0"
                        data-reactions-enabled="1"
                        data-emit-metadata="0"
                        data-input-position="bottom"
                        data-theme="preferred_color_scheme"
                        data-lang="zh-CN"
                        crossorigin="anonymous"
                        async>
                </script>
            </div>

            <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee;">
                <a href="{{ site.baseurl }}/" style="text-decoration: none; color: #0984e3; font-weight: bold;">← 返回首页</a>
            </div>
        </article>

        <!-- Cusdis 评论区，匿名填昵称+邮箱即可 -->
        <div id="cusdis_wrapper" style="margin-top: 50px; margin-bottom: 60px; padding: 30px; background-color: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <h3 style="margin-top: 0; margin-bottom: 25px; color: #2d3436; font-size: 1.3rem;">发表评论</h3>
            <div id="cusdis_thread"
                data-host="https://cusdis.com"
                data-app-id="9ed3bc87-8c4b-40ae-afa6-907fb09cbf19"
                data-page-id="{{ page.title | slugify }}"
                data-page-url="{{ page.url | absolute_url }}"
                data-page-title="{{ page.title }}"
            ></div>
        </div>
    </div>
</body>
</html>
