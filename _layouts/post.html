<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ page.title }} | YIFAN</title> 
    
    <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <script defer src="https://cusdis.com/js/cusdis.es.js"></script>

    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @media (max-width: 768px) {
            .widget {
                padding: 20px !important;
                margin-top: 20px !important;
            }
            .post-body {
                font-size: 16px !important;
                line-height: 1.6;
            }
            h1 {
                font-size: 1.5rem !important;
            }
            #cusdis_wrapper {
                padding: 15px !important;
                margin-top: 30px !important;
            }
        }

        /* 点赞按钮样式 */
        .like-section {
            margin: 40px 0;
            display: flex;
            justify-content: center;
        }

        .like-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            font-family: inherit;
        }

        .like-btn .heart-wrap {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #fff5f5;
            border: 2px solid #ffd6d6;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .like-btn:hover .heart-wrap {
            background: #ffe0e0;
            border-color: #ffaaaa;
            transform: scale(1.05);
        }

        .like-btn.liked .heart-wrap {
            background: #ff6b6b;
            border-color: #ff6b6b;
            animation: pop 0.3s ease;
        }

        .like-btn .heart-icon {
            font-size: 1.6rem;
            color: #ffaaaa;
            transition: color 0.2s ease;
            line-height: 1;
        }

        .like-btn.liked .heart-icon {
            color: #fff;
        }

        .like-btn .like-count {
            font-size: 0.85rem;
            color: #b2bec3;
            transition: color 0.2s ease;
        }

        .like-btn.liked .like-count {
            color: #ff6b6b;
            font-weight: bold;
        }

        .like-btn .like-label {
            font-size: 0.8rem;
            color: #b2bec3;
        }

        @keyframes pop {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .confetti-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .confetti-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            opacity: 0;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="{{ site.baseurl }}/" class="logo">YIFAN</a>
        </div> 
    </nav>

    <div class="container">
        <article class="widget" style="padding: 50px; margin-top: 40px; border-radius: 12px; background-color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <h1>{{ page.title }}</h1> 
            <div class="post-meta" style="color: #b2bec3; margin-bottom: 20px; display: flex; gap: 20px; align-items: center;">
                <span>{{ page.date | date: "%Y-%m-%d" }}</span>
                <span>
                    <i class="fas fa-eye" style="margin-right: 4px;"></i>
                    <span id="busuanzi_value_page_pv">--</span> 次阅读
                </span>
            </div>
            
            <div class="post-body" style="line-height: 1.8;">
                {{ content }}
            </div>

            <!-- 点赞按钮 -->
            <div class="like-section">
                <button class="like-btn" id="likeBtn" onclick="toggleLike()" aria-label="点赞">
                    <div class="heart-wrap" id="heartWrap">
                        <span class="heart-icon">♥</span>
                        <div class="confetti-container" id="confettiContainer"></div>
                    </div>
                    <span class="like-count" id="likeCount">0 人喜欢</span>
                    <span class="like-label">觉得不错就点个赞吧</span>
                </button>
            </div>
            
            <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee;">
                <a href="{{ site.baseurl }}/" style="text-decoration: none; color: #0984e3; font-weight: bold;">← 返回首页</a>
            </div>
        </article>

        <!-- Cusdis 评论区 -->
        <div id="cusdis_wrapper" style="margin-top: 50px; margin-bottom: 60px; padding: 30px; background-color: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <h3 style="margin-top: 0; margin-bottom: 25px; color: #2d3436; font-size: 1.3rem;">发表评论</h3>
            <div id="cusdis_thread"
                data-host="https://cusdis.com"
                data-app-id="9ed3bc87-8c4b-40ae-afa6-907fb09cbf19"
                data-page-id="{{ page.title | slugify }}" 
                data-page-url="{{ page.url | absolute_url }}"
                data-page-title="{{ page.title }}"
            ></div>
        </div>
    </div>

    <script>
        // 用页面路径作为唯一 key，不同文章点赞数互相独立
        const likeKey = 'like_' + window.location.pathname;
        const countKey = likeKey + '_count';

        const btn = document.getElementById('likeBtn');
        const countEl = document.getElementById('likeCount');

        let liked = localStorage.getItem(likeKey) === '1';
        let count = parseInt(localStorage.getItem(countKey) || '0', 10);

        function render() {
            countEl.textContent = count + ' 人喜欢';
            if (liked) {
                btn.classList.add('liked');
            } else {
                btn.classList.remove('liked');
            }
        }

        function spawnConfetti() {
            const container = document.getElementById('confettiContainer');
            const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff922b'];
            for (let i = 0; i < 8; i++) {
                const dot = document.createElement('div');
                dot.className = 'confetti-dot';
                dot.style.background = colors[i % colors.length];
                const dx = (Math.random() > 0.5 ? 1 : -1) * (20 + Math.random() * 30);
                const dy = 20 + Math.random() * 30;
                dot.style.left = (20 + Math.random() * 60) + '%';
                dot.style.top = (20 + Math.random() * 60) + '%';
                dot.style.animation = `none`;
                dot.style.opacity = '1';
                container.appendChild(dot);
                // 手动触发动画
                requestAnimationFrame(() => {
                    dot.style.transition = `transform 0.6s ease-out ${i * 40}ms, opacity 0.6s ease-out ${i * 40}ms`;
                    dot.style.transform = `translate(${dx}px, -${dy}px) scale(0.2)`;
                    dot.style.opacity = '0';
                });
                setTimeout(() => dot.remove(), 800 + i * 40);
            }
        }

        function toggleLike() {
            if (!liked) {
                liked = true;
                count++;
                spawnConfetti();
            } else {
                liked = false;
                count = Math.max(0, count - 1);
            }
            localStorage.setItem(likeKey, liked ? '1' : '0');
            localStorage.setItem(countKey, String(count));
            render();
        }

        render();
    </script>
</body>
</html>
