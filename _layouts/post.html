<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ page.title }} | YIFAN</title>

    <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <script defer src="https://cusdis.com/js/cusdis.es.js"></script>

    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* 移动端优化 */
        @media (max-width: 768px) {
            .widget {
                padding: 20px !important;
                margin-top: 20px !important;
            }
            .post-body {
                font-size: 16px !important;
                line-height: 1.6;
            }
            h1 {
                font-size: 1.5rem !important;
            }
            #cusdis_wrapper {
                padding: 15px !important;
                margin-top: 30px !important;
            }
            #back-to-top {
                width: 40px !important;
                height: 40px !important;
                right: 16px !important;
                bottom: 16px !important;
            }
        }

        /* 阅读进度条 */
        #reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(to right, #0984e3, #74b9ff);
            z-index: 9999;
            transition: width 0.1s linear;
        }

        /* 回到顶部按钮 */
        #back-to-top {
            position: fixed;
            right: 24px;
            bottom: 32px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #0984e3;
            color: #fff;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(9,132,227,0.35);
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 999;
        }
        #back-to-top.visible {
            opacity: 1;
            transform: translateY(0);
        }
        #back-to-top:hover {
            background: #0773c5;
        }

        /* 代码块复制按钮 */
        .code-block-wrapper {
            position: relative;
        }
        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 10px;
            font-size: 0.75rem;
            background: rgba(255,255,255,0.15);
            color: #dfe6e9;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .copy-btn:hover {
            background: rgba(255,255,255,0.28);
        }
        .copy-btn.copied {
            color: #55efc4;
            border-color: #55efc4;
        }

        /* 图片灯箱 */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }
        #lightbox.open {
            display: flex;
        }
        #lightbox img {
            max-width: 92vw;
            max-height: 92vh;
            border-radius: 6px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }
        .post-body img {
            cursor: zoom-in;
            border-radius: 6px;
            transition: opacity 0.2s;
        }
        .post-body img:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <!-- 阅读进度条 -->
    <div id="reading-progress"></div>

    <!-- 图片灯箱 -->
    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="">
    </div>

    <nav class="navbar">
        <div class="container">
            <a href="{{ site.baseurl }}/" class="logo">YIFAN</a>
        </div>
    </nav>

    <div class="container">
        <article class="widget" style="padding: 50px; margin-top: 40px; border-radius: 12px; background-color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <h1>{{ page.title }}</h1>
            <div class="post-meta" style="color: #b2bec3; margin-bottom: 20px; display: flex; gap: 20px; align-items: center;">
                <span>{{ page.date | date: "%Y-%m-%d" }}</span>
                <span>
                    <i class="fas fa-eye" style="margin-right: 4px;"></i>
                    <span id="busuanzi_value_page_pv">--</span> 次阅读
                </span>
            </div>

            <div class="post-body" style="line-height: 1.8;">
                {{ content }}
            </div>

            <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee;">
                <a href="{{ site.baseurl }}/" style="text-decoration: none; color: #0984e3; font-weight: bold;">← 返回首页</a>
            </div>
        </article>

        <!-- Cusdis 评论区 -->
        <div id="cusdis_wrapper" style="margin-top: 50px; margin-bottom: 60px; padding: 30px; background-color: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <h3 style="margin-top: 0; margin-bottom: 25px; color: #2d3436; font-size: 1.3rem;">发表评论</h3>
            <div id="cusdis_thread"
                data-host="https://cusdis.com"
                data-app-id="9ed3bc87-8c4b-40ae-afa6-907fb09cbf19"
                data-page-id="{{ page.title | slugify }}"
                data-page-url="{{ page.url | absolute_url }}"
                data-page-title="{{ page.title }}"
            ></div>
        </div>
    </div>

    <!-- 回到顶部按钮 -->
    <button id="back-to-top" onclick="scrollToTop()" aria-label="回到顶部">
        <i class="fas fa-chevron-up"></i>
    </button>

    <script>
        // 阅读进度条
        const progressBar = document.getElementById('reading-progress');
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            progressBar.style.width = (docHeight > 0 ? (scrollTop / docHeight) * 100 : 0) + '%';

            // 回到顶部按钮显示/隐藏
            const btn = document.getElementById('back-to-top');
            if (scrollTop > 300) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        });

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 代码块复制按钮
        document.querySelectorAll('pre').forEach(pre => {
            const wrapper = document.createElement('div');
            wrapper.className = 'code-block-wrapper';
            pre.parentNode.insertBefore(wrapper, pre);
            wrapper.appendChild(pre);

            const btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.textContent = '复制';
            wrapper.appendChild(btn);

            btn.addEventListener('click', () => {
                const code = pre.querySelector('code') ? pre.querySelector('code').innerText : pre.innerText;
                navigator.clipboard.writeText(code).then(() => {
                    btn.textContent = '已复制 ✓';
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.textContent = '复制';
                        btn.classList.remove('copied');
                    }, 2000);
                });
            });
        });

        // 图片点击放大灯箱
        document.querySelectorAll('.post-body img').forEach(img => {
            img.addEventListener('click', () => {
                document.getElementById('lightbox-img').src = img.src;
                document.getElementById('lightbox').classList.add('open');
                document.body.style.overflow = 'hidden';
            });
        });

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }

        // ESC 键关闭灯箱
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>
</html>
