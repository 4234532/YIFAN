<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ page.title }} | YIFAN</title> 
    
    <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* 移动端专属样式优化 */
        @media (max-width: 768px) {
            .widget {
                padding: 20px !important;
                margin-top: 20px !important;
            }
            .post-body {
                font-size: 16px !important;
                line-height: 1.6;
            }
            h1 {
                font-size: 1.5rem !important;
            }
            .giscus-wrapper {
                padding: 15px !important;
                margin-top: 30px !important;
            }
        }

        /* Giscus 评论区样式 */
        .giscus-wrapper {
            margin-top: 50px;
            margin-bottom: 60px;
            padding: 30px;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .giscus-wrapper h3 {
            margin-top: 0;
            margin-bottom: 25px;
            color: #2d3436;
            font-size: 1.3rem;
        }
        .giscus {
            width: 100%;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="{{ site.baseurl }}/" class="logo">YIFAN</a>
        </div> 
    </nav>

    <div class="container">
        <article class="widget" style="padding: 50px; margin-top: 40px; border-radius: 12px; background-color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <h1>{{ page.title }}</h1> 
            <div class="post-meta" style="color: #b2bec3; margin-bottom: 20px; display: flex; gap: 20px; align-items: center;">
                <span>{{ page.date | date: "%Y-%m-%d" }}</span>
                <span>
                    <i class="fas fa-eye" style="margin-right: 4px;"></i>
                    <span id="busuanzi_value_page_pv">--</span> 次阅读
                </span>
            </div>
            
            <div class="post-body" style="line-height: 1.8;">
                {{ content }} 
            </div>
            
            <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee;">
                <a href="{{ site.baseurl }}/" style="text-decoration: none; color: #0984e3; font-weight: bold;">← 返回首页</a>
            </div>
        </article>

        <!-- Giscus 评论 + 点赞区（一体化） -->
        <div class="giscus-wrapper">
            <h3>评论与互动</h3>
            <script src="https://giscus.app/client.js"
                    data-repo="4234532/YIFAN"
                    data-repo-id="R_kgDORKpgJw"
                    data-category="General"
                    data-category-id="DIC_kwDORKpgJ84C3rf5"
                    data-mapping="pathname"
                    data-strict="0"
                    data-reactions-enabled="1"
                    data-emit-metadata="0"
                    data-input-position="bottom"
                    data-theme="preferred_color_scheme"
                    data-lang="zh-CN"
                    crossorigin="anonymous"
                    async>
            </script>
        </div>
        
    </div>
</body>
</html>
